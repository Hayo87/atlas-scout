title: "Info"

purpose: >
  Atlas Scout is a demo application for terrain-based decision support. Users
  interact through a chat-based copilot that helps interpret terrain from an
  operational perspective using aggregated imagery and geospatial data. It
  identifies relevant terrain features, detects obstacles and changes,
  visualizes overlays, and supports planning.

key_requirements:
  - Chat-based user interaction
  - Aggregated imagery and geospatial data input
  - Terrain feature identification and classification
  - Terrain change and obstacle detection
  - Operational overlay generation on user request
  - Terrain-related query answering and interpretation
  - Interactive demo interface

modules:
  - name: "Info"
    description: "App purpose, key requirements, and demo overview"
  - name: "Segments"
    description: "Split terrain into useful segments for analysis and planning"
  - name: "Features"
    description: "Identify terrain features and classify segments"
  - name: "Overlay"
    description: "Visualize terrain layers, markers, and map overlays"
  - name: "Chat"
    description: "Chat-based copilot for terrain interpretation, overlay requests, and simple operational queries"